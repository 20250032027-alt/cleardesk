<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px;
    background: #FAF7F2;
    font-family: Georgia, serif;
    display: flex; align-items: center;
    overflow: hidden;
  }
  .left {
    padding: 80px;
    flex: 1;
  }
  .eyebrow {
    font-family: system-ui, sans-serif;
    font-size: 14px; font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: #4A7C59; margin-bottom: 24px;
  }
  h1 {
    font-size: 64px; font-weight: 600;
    line-height: 1.1; letter-spacing: -0.02em;
    color: #1C1A17; margin-bottom: 24px;
  }
  h1 em { font-style: italic; color: #4A7C59; }
  p {
    font-family: system-ui, sans-serif;
    font-size: 20px; font-weight: 300;
    color: #6B6760; line-height: 1.6; max-width: 480px;
  }
  .right {
    width: 400px; height: 100%;
    background: #EBF3EE;
    display: flex; flex-direction: column;
    justify-content: center; padding: 60px 50px;
    gap: 20px;
  }
  .tool {
    background: white;
    border-radius: 16px;
    padding: 20px 24px;
    border: 0.5px solid #E8E0D4;
  }
  .tool-name {
    font-family: system-ui, sans-serif;
    font-size: 14px; font-weight: 500;
    color: #1C1A17; margin-bottom: 4px;
  }
  .tool-desc {
    font-family: system-ui, sans-serif;
    font-size: 12px; color: #6B6760;
  }
  .domain {
    font-family: system-ui, sans-serif;
    font-size: 13px; color: #B0ADA8;
    margin-top: 32px;
  }
</style>
</head>
<body>
  <div class="left">
    <div class="eyebrow">Built from experience</div>
    <h1>Clear<em>Desk</em></h1>
    <p>Free ADHD tools and honest guides. Written from inside the experience.</p>
    <div class="domain">cleardesk.co</div>
  </div>
  <div class="right">
    <div class="tool">
      <div class="tool-name">Body double timer</div>
      <div class="tool-desc">Focus with customizable intervals</div>
    </div>
    <div class="tool">
      <div class="tool-name">Meds tracker</div>
      <div class="tool-desc">Did I take them? One tap log</div>
    </div>
    <div class="tool">
      <div class="tool-name">Task unkicker</div>
      <div class="tool-desc">AI breaks stuck tasks into steps</div>
    </div>
  </div>
</body>
</html>
